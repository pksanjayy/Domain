<div class="form-container">
  <div class="header-section">
    <h1>{{ isEditMode ? 'Edit Service Booking' : 'New Service Booking' }}</h1>
    <button mat-icon-button (click)="onCancel()" matTooltip="Back to list">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()" class="booking-form" *ngIf="bookingForm">
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Customer ID</mat-label>
            <input matInput type="number" formControlName="customerId" placeholder="Enter Customer ID">
            <mat-error *ngIf="bookingForm.get('customerId')?.hasError('required')">Customer ID is required</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Booking Date</mat-label>
            <input matInput [matDatepicker]="bookingPicker" formControlName="bookingDate">
            <mat-datepicker-toggle matIconSuffix [for]="bookingPicker"></mat-datepicker-toggle>
            <mat-datepicker #bookingPicker></mat-datepicker>
            <mat-error *ngIf="bookingForm.get('bookingDate')?.hasError('required')">Booking Date is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Preferred Service Date</mat-label>
            <input matInput [matDatepicker]="preferredPicker" formControlName="preferredServiceDate">
            <mat-datepicker-toggle matIconSuffix [for]="preferredPicker"></mat-datepicker-toggle>
            <mat-datepicker #preferredPicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Service Type</mat-label>
            <mat-select formControlName="serviceType">
              <mat-option *ngFor="let type of serviceTypes" [value]="type">{{type}}</mat-option>
            </mat-select>
            <mat-error *ngIf="bookingForm.get('serviceType')?.hasError('required')">Service type is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Status</mat-label>
            <mat-select formControlName="status">
              <mat-option *ngFor="let stat of statusOptions" [value]="stat">{{stat}}</mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width complaint-textarea">
            <mat-label>Complaints / Service Requests</mat-label>
            <textarea matInput formControlName="complaints" rows="4" placeholder="Describe issues..."></textarea>
          </mat-form-field>
        </div>

        <div class="card-actions">
          <button mat-button type="button" (click)="onCancel()" [disabled]="isLoading">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="bookingForm.invalid || isLoading">
            {{ isEditMode ? 'Update ' : 'Save ' }} Booking
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
