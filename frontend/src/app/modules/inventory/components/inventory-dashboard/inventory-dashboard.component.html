<div class="dashboard-container">
  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-overlay">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <ng-container *ngIf="!isLoading && summary">
    <!-- KPI Cards -->
    <mat-grid-list [cols]="gridCols" rowHeight="140px" gutterSize="16" class="kpi-grid">
      <mat-grid-tile *ngFor="let card of kpiCards">
        <mat-card class="kpi-card" [style.border-left-color]="card.color">
          <mat-card-content>
            <div class="kpi-content">
              <div class="kpi-info">
                <span class="kpi-title">{{ card.title }}</span>
                <span class="kpi-value" [style.color]="card.color">{{ card.value }}</span>
              </div>
              <mat-icon class="kpi-icon" [style.color]="card.color">{{ card.icon }}</mat-icon>
            </div>
          </mat-card-content>
        </mat-card>
      </mat-grid-tile>
    </mat-grid-list>

    <!-- Charts Row -->
    <div class="charts-row">
      <!-- Bar Chart -->
      <mat-card class="chart-card">
        <mat-card-content>
          <div class="chart-container">
            <canvas baseChart
              [data]="barChartData"
              [options]="barChartOptions"
              type="bar">
            </canvas>
          </div>
        </mat-card-content>
      </mat-card>

      <!-- Doughnut Chart -->
      <mat-card class="chart-card">
        <mat-card-content>
          <div class="chart-container">
            <canvas baseChart
              [data]="doughnutChartData"
              [options]="doughnutChartOptions"
              type="doughnut">
            </canvas>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

  </ng-container>
</div>
