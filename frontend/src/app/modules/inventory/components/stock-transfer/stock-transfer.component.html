<div class="transfer-container">
  <h2 class="section-title">Stock Transfers</h2>

  <div class="transfer-split">
    <!-- Left Panel: Transfer List -->
    <div class="transfer-list-panel">
      <app-data-table
        [columns]="columns"
        [filterConfig]="filterConfig"
        [apiUrl]="apiUrl"
        [defaultSort]="{ field: 'requestedAt', direction: 'DESC' }">
      </app-data-table>

      <!-- Approve/Reject actions for MANAGER_VIEWER -->
      <div class="transfer-actions-note" *hasRole="'MANAGER_VIEWER,SUPER_ADMIN'">
        <mat-icon>info</mat-icon>
        <span>Click on pending transfers in the table to approve or reject them.</span>
      </div>
    </div>

    <!-- Right Panel: Request Form -->
    <div class="transfer-form-panel">
      <mat-card class="form-card">
        <mat-card-header>
          <mat-card-title>Request Transfer</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <form [formGroup]="transferForm" (ngSubmit)="onSubmit()" class="transfer-form">
            <!-- From Branch (auto-filled) -->
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>From Branch</mat-label>
              <input matInput formControlName="fromBranch">
            </mat-form-field>

            <!-- To Branch -->
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>To Branch <span class="required">*</span></mat-label>
              <mat-select formControlName="toBranchId">
                <mat-option *ngFor="let branch of branches" [value]="branch.id">
                  {{ branch.name }}
                </mat-option>
              </mat-select>
              <mat-error>Destination branch is required</mat-error>
            </mat-form-field>

            <!-- Vehicle Search (Autocomplete) -->
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Vehicle (VIN / Model) <span class="required">*</span></mat-label>
              <input matInput formControlName="vehicleSearch"
                     [matAutocomplete]="vehicleAuto"
                     placeholder="Search by VIN or model">
              <mat-autocomplete #vehicleAuto="matAutocomplete">
                <mat-option *ngFor="let v of filteredVehicles$ | async"
                            [value]="v.vin"
                            (onSelectionChange)="onVehicleSelected(v)">
                  {{ v.vin }} — {{ v.brand }} {{ v.model }}
                </mat-option>
              </mat-autocomplete>
              <mat-error>Vehicle selection is required</mat-error>
            </mat-form-field>

            <!-- Remarks -->
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Remarks</mat-label>
              <textarea matInput formControlName="remarks" rows="3"
                        placeholder="Reason for transfer"></textarea>
            </mat-form-field>

            <!-- Submit -->
            <button mat-raised-button color="primary" type="submit"
                    [disabled]="isSubmitting" class="submit-btn">
              <mat-spinner *ngIf="isSubmitting" diameter="18" class="submit-spinner"></mat-spinner>
              Request Transfer
            </button>
          </form>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
