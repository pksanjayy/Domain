<div class="grn-form-container">
  <div class="form-header">
    <button mat-icon-button (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>{{ isEditMode ? 'Update' : 'Create' }} Goods Received Note</h2>
  </div>

  <mat-card class="form-card">
    <mat-card-content>
      <form [formGroup]="grnForm" (ngSubmit)="onSubmit()" class="grn-form">
        <!-- Vehicle VIN Autocomplete -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Vehicle VIN <span class="required">*</span></mat-label>
          <input matInput formControlName="vehicleVin"
                 [matAutocomplete]="vinAuto"
                 placeholder="Start typing VIN (min 3 chars)">
          <mat-autocomplete #vinAuto="matAutocomplete">
            <mat-option *ngFor="let v of filteredVehicles$ | async" [value]="v.vin">
              {{ v.vin }} — {{ v.brand }} {{ v.model }}
            </mat-option>
          </mat-autocomplete>
          <mat-error>Vehicle VIN is required</mat-error>
        </mat-form-field>

        <div class="form-row">
          <!-- Arrival Date -->
          <mat-form-field appearance="outline">
            <mat-label>Arrival Date <span class="required">*</span></mat-label>
            <input matInput [matDatepicker]="arrivalPicker" formControlName="arrivalDate">
            <mat-datepicker-toggle matIconSuffix [for]="arrivalPicker"></mat-datepicker-toggle>
            <mat-datepicker #arrivalPicker></mat-datepicker>
            <mat-error>Arrival date is required</mat-error>
          </mat-form-field>

          <!-- Condition -->
          <mat-form-field appearance="outline">
            <mat-label>Arrival Condition <span class="required">*</span></mat-label>
            <mat-select formControlName="arrivalCondition">
              <mat-option *ngFor="let c of conditions" [value]="c.value">{{ c.label }}</mat-option>
            </mat-select>
            <mat-error>Condition is required</mat-error>
          </mat-form-field>
        </div>

        <!-- Remarks -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Remarks</mat-label>
          <textarea matInput formControlName="remarks" rows="3" placeholder="Inspection notes"></textarea>
          <mat-hint align="end">{{ grnForm.get('remarks')?.value?.length || 0 }}/500</mat-hint>
        </mat-form-field>

        <!-- Actions -->
        <div class="form-actions">
          <button mat-button type="button" (click)="goBack()">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="isSubmitting">
            <mat-spinner *ngIf="isSubmitting" diameter="18" class="submit-spinner"></mat-spinner>
            {{ isEditMode ? 'Update' : 'Create' }} GRN
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
