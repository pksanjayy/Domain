<div class="form-container">
  <div class="header-section">
    <h1>{{ isEditMode ? 'Edit Customer' : 'New Customer' }}</h1>
    <button mat-icon-button (click)="onCancel()" matTooltip="Back to list">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="loading-shade" *ngIf="isLoading">
        <mat-spinner diameter="40"></mat-spinner>
      </div>

      <form [formGroup]="customerForm" (ngSubmit)="onSubmit()" class="customer-form" *ngIf="customerForm">
        
        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Name</mat-label>
            <input matInput formControlName="name" placeholder="Enter customer name">
            <mat-error *ngIf="customerForm.get('name')?.hasError('required')">Name is required</mat-error>
            <mat-error *ngIf="customerForm.get('name')?.hasError('maxlength')">Name is too long</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Mobile</mat-label>
            <input matInput formControlName="mobile" placeholder="10-digit mobile number">
            <mat-error *ngIf="customerForm.get('mobile')?.hasError('required')">Mobile is required</mat-error>
            <mat-error *ngIf="customerForm.get('mobile')?.hasError('pattern')">Enter valid 10-digit mobile</mat-error>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="customer@example.com">
            <mat-error *ngIf="customerForm.get('email')?.hasError('required')">Email is required</mat-error>
            <mat-error *ngIf="customerForm.get('email')?.hasError('email')">Enter valid email</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Date of Birth</mat-label>
            <input matInput [matDatepicker]="dobPicker" formControlName="dob">
            <mat-datepicker-toggle matIconSuffix [for]="dobPicker"></mat-datepicker-toggle>
            <mat-datepicker #dobPicker></mat-datepicker>
          </mat-form-field>
        </div>

        <div class="form-row">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Location</mat-label>
            <input matInput formControlName="location" placeholder="City / Area">
          </mat-form-field>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Branch</mat-label>
            <mat-select formControlName="branchId">
              <mat-option *ngFor="let branch of branches" [value]="branch.id">
                {{ branch.name }}
              </mat-option>
            </mat-select>
            <mat-error>Branch is required</mat-error>
          </mat-form-field>
        </div>

        <div class="card-actions">
          <button mat-button type="button" (click)="onCancel()" [disabled]="isLoading">Cancel</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="customerForm.invalid || isLoading">
            {{ isEditMode ? 'Update' : 'Create' }} Customer
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
