<mat-expansion-panel [expanded]="isExpanded" (expandedChange)="isExpanded = $event">
  <mat-expansion-panel-header>
    <mat-panel-title>
      <mat-icon>filter_list</mat-icon>
      <span>Filters</span>
    </mat-panel-title>
  </mat-expansion-panel-header>

  <form [formGroup]="filterForm" (ngSubmit)="applyFilters()" class="filter-form">
    <div class="filter-fields">
      <ng-container *ngFor="let field of fields">
        <!-- Text Input -->
        <mat-form-field *ngIf="field.type === 'text'" appearance="outline">
          <mat-label>{{ field.label }}</mat-label>
          <input matInput [formControlName]="field.field" />
        </mat-form-field>

        <!-- Select -->
        <mat-form-field *ngIf="field.type === 'select'" appearance="outline">
          <mat-label>{{ field.label }}</mat-label>
          <mat-select [formControlName]="field.field">
            <mat-option value="">All</mat-option>
            <mat-option *ngFor="let opt of field.options" [value]="opt.value">
              {{ opt.label }}
            </mat-option>
          </mat-select>
        </mat-form-field>

        <!-- Date -->
        <mat-form-field *ngIf="field.type === 'date'" appearance="outline">
          <mat-label>{{ field.label }}</mat-label>
          <input matInput [matDatepicker]="picker" [formControlName]="field.field" />
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <!-- Date Range -->
        <ng-container *ngIf="field.type === 'daterange'">
          <mat-form-field appearance="outline">
            <mat-label>{{ field.label }} From</mat-label>
            <input matInput [matDatepicker]="fromPicker" [formControlName]="field.field + '_from'" />
            <mat-datepicker-toggle matIconSuffix [for]="fromPicker"></mat-datepicker-toggle>
            <mat-datepicker #fromPicker></mat-datepicker>
          </mat-form-field>
          <mat-form-field appearance="outline">
            <mat-label>{{ field.label }} To</mat-label>
            <input matInput [matDatepicker]="toPicker" [formControlName]="field.field + '_to'" />
            <mat-datepicker-toggle matIconSuffix [for]="toPicker"></mat-datepicker-toggle>
            <mat-datepicker #toPicker></mat-datepicker>
          </mat-form-field>
        </ng-container>
      </ng-container>
    </div>

    <div class="filter-actions">
      <button mat-raised-button color="primary" type="submit">Apply</button>
      <button mat-button type="button" (click)="resetFilters()">Reset</button>
    </div>
  </form>
</mat-expansion-panel>
