<div class="notification-bell" (click)="$event.stopPropagation()">
  <button mat-icon-button (click)="toggleDropdown()" class="bell-button">
    <mat-icon [matBadge]="unreadCount > 0 ? unreadCount : null" matBadgeColor="warn" matBadgeSize="small">
      notifications
    </mat-icon>
  </button>

  <div class="notification-dropdown" *ngIf="showDropdown">
    <div class="dropdown-header">
      <span>Notifications</span>
      <button mat-button color="primary" (click)="markAllRead()" *ngIf="unreadCount > 0">
        Mark all read
      </button>
    </div>

    <div class="notification-list">
      <div
        *ngFor="let notification of notifications"
        class="notification-item"
        [class.unread]="!notification.isRead"
        (click)="onNotificationClick(notification)">
        <div class="notification-content">
          <div class="notification-title">
            <mat-icon class="priority-icon" [ngClass]="'priority-' + notification.priority.toLowerCase()">
              {{ notification.priority === 'CRITICAL' ? 'error' : notification.priority === 'HIGH' ? 'warning' : 'info' }}
            </mat-icon>
            <span>{{ notification.title }}</span>
          </div>
          <p class="notification-message">{{ notification.message }}</p>
          <span class="notification-time">{{ notification.createdAt | date:'short' }}</span>
        </div>
      </div>

      <div *ngIf="notifications.length === 0" class="empty-notifications">
        <mat-icon>notifications_none</mat-icon>
        <p>No notifications</p>
      </div>
    </div>
  </div>
</div>
