spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  liquibase:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none

app:
  jwt:
    secret: dGhpcyBpcyBhIDI1NiBiaXQgc2VjcmV0IGtleSBmb3IgSFMyNTYgand0IHNpZ25pbmcgdXNlZCBpbiBkbXM=
    access-token-expiry: 28800000
    refresh-token-expiry: 604800000

  security:
    max-failed-attempts: 5
    lock-duration-minutes: 30
